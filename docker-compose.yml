version: '3.8'

services:
  web:
    build: .
    container_name: movico_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=MOVICO
      - SECRET_KEY=your-production-secret-key-change-this
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=movico_user
      - POSTGRES_PASSWORD=movico_pass
      - POSTGRES_DB=movico_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - DATA_DIR=/workspace/data
      - MODELS_DIR=/workspace/models_checkpoint
    volumes:
      - ./data:/workspace/data
      - ./models_checkpoint:/workspace/models_checkpoint
      - ./logs:/workspace/logs
    depends_on:
      - db
      - redis

  db:
    image: postgres:15-alpine
    container_name: movico_postgres
    restart: always
    environment:
      - POSTGRES_USER=movico_user
      - POSTGRES_PASSWORD=movico_pass
      - POSTGRES_DB=movico_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: movico_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
