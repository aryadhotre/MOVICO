name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Inspect Workspace Directory Structure
        run: |
          echo "=== Current working directory ==="
          pwd
          echo "=== Root directory contents ==="
          ls -la
          echo "=== Directory tree (recursive) ==="
          find . -maxdepth 3 -not -path '*/.*'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          elif [ -f Movie-Recommendation-System-MOVICO-main/MOVICO/requirements.txt ]; then
            pip install -r Movie-Recommendation-System-MOVICO-main/MOVICO/requirements.txt
          fi

      - name: Run Tests with Pytest
        env:
          APP_ENV: testing
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          USE_SQLITE: "true"
        run: |
          # Try running pytest in root, if it fails because of no tests, try the subfolder
          if [ -f pytest.ini ]; then
            python -m pytest -v
          elif [ -d Movie-Recommendation-System-MOVICO-main/MOVICO ]; then
            cd Movie-Recommendation-System-MOVICO-main/MOVICO
            python -m pytest -v
          else
            echo "No pytest.ini found and no nested MOVICO folder found."
            exit 4
          fi
